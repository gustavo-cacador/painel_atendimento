<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento Coren</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center">Seja bem-vindo ao atendimento Coren</h2>

    <!-- Exibir mensagem de sucesso -->
    <div th:if="${mensagem}" class="alert alert-success" role="alert">
        <span th:text="${mensagem}"></span>
    </div>

    <form action="/senhas/gerar" method="post" class="mt-4">
        <div class="mb-3">
            <label for="nome" class="form-label">Por favor, insira seu nome:</label>
            <input type="text" id="nome" name="nome" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="servico" class="form-label">Escolha o tipo de serviço que deseja:</label>
            <select id="servico" name="servico" class="form-control" required>
                <option value="Primeira inscrição">Primeira inscrição</option>
                <option value="Renovação de carteira">Renovação de carteira</option>
                <option value="Apresentação de documentos">Apresentação de documentos</option>
                <option value="Negociação de débitos">Negociação de débitos</option>
                <option value="Outros">Outros</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary w-100">Gerar Senha</button>
    </form>
</div>

</body>
</html>
