<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Painel de Atendimento</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<div class="container mt-4">
    <h2 class="text-center">Painel de Atendimento</h2>

    <div class="row mt-4">
        <!-- Senhas Atendidas -->
        <div class="col-md-6">
            <h4 class="text-success text-center">Senhas Atendidas</h4>
            <ul class="list-group">
                <li class="list-group-item list-group-item-success" th:each="senha : ${senhasAtendidas}" th:text="${senha.senha}"></li>
            </ul>
        </div>

        <!-- Senhas na Fila -->
        <div class="col-md-6">
            <h4 class="text-danger text-center">Senhas na Fila</h4>
            <ul class="list-group">
                <li class="list-group-item list-group-item-warning" th:each="senha : ${senhasPendentes}" th:text="${senha.senha}"></li>
            </ul>
        </div>
    </div>
</div>

<!-- Script para atualizar a fila automaticamente a cada 5 segundos -->
<script>
    function atualizarPainel() {
        location.reload();
    }
    setInterval(atualizarPainel, 5000);
</script>

</body>
</html>
